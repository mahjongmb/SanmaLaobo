<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>麻雀MB 三麻チャレンジ</title>
  <meta name="description" content="麻雀MBの三麻チャレンジページです。当店のフリーと同じルールで1半荘チャレンジを遊べて、来店特典クーポンを取得できます。" />
  <style>
    :root{
      --bg:#0a1712;
      --bg2:#123025;
      --panel:rgba(8, 20, 15, 0.78);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.72);
      --gold:#d9bb72;
      --gold-strong:#f1d48d;
      --shadow:0 18px 54px rgba(0,0,0,0.34);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(241,212,141,0.18), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.26), transparent 36%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #08110d 100%);
      overflow-x:hidden;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      border-radius:50%;
      filter:blur(2px);
      opacity:0.58;
    }

    body::before{
      width:360px;
      height:360px;
      top:-120px;
      left:-120px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    }

    body::after{
      width:300px;
      height:300px;
      right:-90px;
      bottom:-90px;
      background:radial-gradient(circle, rgba(217,187,114,0.16), transparent 68%);
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .titleScreen{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:24px;
      position:relative;
    }

    .titlePanel{
      width:min(100%, 760px);
      padding:42px 28px 30px;
      border-radius:28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      text-align:center;
      backdrop-filter:blur(10px);
      position:relative;
      overflow:hidden;
    }

    .titlePanel::before{
      content:"";
      position:absolute;
      inset:-120px auto auto 50%;
      width:260px;
      height:260px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(217,187,114,0.15), transparent 70%);
      pointer-events:none;
    }

    .titleInner{
      position:relative;
      z-index:1;
    }

    .titleKicker{
      font-size:13px;
      font-weight:800;
      letter-spacing:0.18em;
      color:var(--gold-strong);
    }

    .titleLogo{
      margin-top:14px;
      font-size:clamp(44px, 9vw, 84px);
      font-weight:900;
      letter-spacing:0.06em;
      line-height:1;
      text-shadow:0 10px 28px rgba(0,0,0,0.24);
    }

    .titleSub{
      margin-top:12px;
      font-size:clamp(22px, 4.6vw, 36px);
      font-weight:800;
      line-height:1.3;
    }

    .titleLead{
      margin:16px auto 0;
      max-width:34em;
      font-size:14px;
      line-height:1.8;
      color:var(--muted);
    }

    .titleNotice{
      margin:18px auto 0;
      max-width:36em;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.05);
      font-size:13px;
      line-height:1.8;
      color:var(--muted);
      text-align:left;
    }

    .titleNotice strong{
      color:var(--gold-strong);
      font-weight:900;
    }

    .titleActions{
      margin-top:28px;
      display:grid;
      gap:12px;
    }

    .mainStartBtn,
    .subMenuBtn{
      min-height:56px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      font-size:16px;
      font-weight:800;
      transition:transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      border:0;
      cursor:pointer;
    }

    .mainStartBtn:hover,
    .subMenuBtn:hover{
      transform:translateY(-1px);
    }

    .mainStartBtn{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      box-shadow:0 14px 30px rgba(0,0,0,0.26);
    }

    .subActionGrid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }

    .subMenuBtn{
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      color:var(--text);
    }

    .titleFooter{
      margin-top:22px;
      display:flex;
      justify-content:center;
      gap:16px;
      flex-wrap:wrap;
      font-size:13px;
      color:var(--muted);
    }

    .titleFooter a{
      padding-bottom:2px;
      border-bottom:1px solid rgba(255,255,255,0.16);
    }

    .cornerLabel{
      position:fixed;
      left:18px;
      bottom:14px;
      font-size:11px;
      letter-spacing:0.12em;
      color:rgba(255,255,255,0.34);
      pointer-events:none;
    }

    @media (max-width: 640px){
      .titleScreen{
        padding:16px;
      }

      .titlePanel{
        padding:34px 18px 22px;
        border-radius:22px;
      }

      .titleLead{
        font-size:13px;
        line-height:1.7;
      }

      .titleNotice{
        padding:12px 13px;
        font-size:12px;
        line-height:1.75;
      }

      .mainStartBtn,
      .subMenuBtn{
        min-height:52px;
        font-size:15px;
      }

      .subActionGrid{
        grid-template-columns:1fr;
      }

      .titleFooter{
        margin-top:18px;
        gap:12px;
        font-size:12px;
      }

      .cornerLabel{
        left:12px;
        bottom:10px;
        font-size:10px;
      }
    }

    @media (orientation: landscape) and (max-height: 560px){
      .titleScreen{
        min-height:auto;
        place-items:start center;
        padding:18px 16px 28px;
      }

      .titlePanel{
        padding:26px 18px 20px;
        border-radius:20px;
      }

      .titleKicker{
        font-size:11px;
      }

      .titleLogo{
        margin-top:10px;
        font-size:clamp(34px, 6vw, 56px);
      }

      .titleSub{
        margin-top:8px;
        font-size:clamp(18px, 3.2vw, 28px);
      }

      .titleLead{
        margin-top:10px;
        font-size:12px;
        line-height:1.6;
      }

      .titleNotice{
        margin-top:12px;
        padding:11px 12px;
        font-size:11px;
        line-height:1.65;
      }

      .titleActions{
        margin-top:16px;
        gap:8px;
      }

      .mainStartBtn,
      .subMenuBtn{
        min-height:44px;
        font-size:14px;
      }

      .subActionGrid{
        gap:8px;
      }

      .titleFooter{
        margin-top:14px;
        gap:10px;
        font-size:11px;
      }
    }
  </style>
  <script>
    window.MB_SANMA_MBTRIAL_SUPABASE_CONFIG = {

  </script>
</head>
<body>
  <main class="titleScreen">
    <section class="titlePanel" aria-label="麻雀MB 三麻チャレンジ トップ">
      <div class="titleInner">

        <div class="titleNotice">

            <button id="openMbTrialCouponBtn" type="button" class="subMenuBtn">取得クーポン</button>
            <a class="subMenuBtn" href="price.html">料金・営業時間</a>

          </div>
        </div>

        <div class="titleFooter">
          <a href="https://lin.ee/RhcYb8r" target="_blank" rel="noopener noreferrer">LINE</a>
          <a href="https://mj-king.net/tempos/view/10788" target="_blank" rel="noopener noreferrer">麻雀王国</a>
        </div>
      </div>
    </section>
  </main>

  <div class="cornerLabel">SANMA CHALLENGE VERSION</div>

  <script src="../../js/mbtrial_coupon_client.js"></script>
  <script src="../../js/mbtrial_ui.js"></script>
</body>
</html>
