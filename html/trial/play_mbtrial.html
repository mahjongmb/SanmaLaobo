  <script>
    (function(){
      window.MBSANMA_ASSET_PREFIX = "../../";
      const ACTIVE_SESSION_STORAGE_KEY = "mbsanma_mbtrial_active_session_v1";
      try{
        const raw = sessionStorage.getItem(ACTIVE_SESSION_STORAGE_KEY);
        if (!raw){
          location.replace("../public/index_mbtrial.html");
          return;
        }
        const parsed = JSON.parse(raw);
        const mode = parsed && parsed.mode;
        if (mode !== "trial"){
          location.replace("../public/index_mbtrial.html");
        }
      }catch(e){
        location.replace("../public/index_mbtrial.html");
      }
    })();

    #settingsOverlay{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      z-index: 4000;
      padding: 20px;
      box-sizing: border-box;
    }
    #settingsPanel{
      width: min(920px, 96vw);
      min-height: min(620px, 84vh);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(18, 24, 20, 0.96);
      color: #f3f5f2;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      padding: 18px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }
    #settingsHeader{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex: 0 0 auto;
    }
    #settingsTitleWrap{
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #settingsTitle{
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
    }
    #settingsSubTitle{
      font-size: 12px;
      opacity: 0.72;
      line-height: 1.3;
    }
    #settingsCloseBtn{
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    #settingsBody{
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    #settingsTabs{
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      flex: 0 0 auto;
    }
    .settingsTabBtn{
      appearance: none;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      min-height: 42px;
      padding: 0 14px;
      background: rgba(255,255,255,0.04);
      color: rgba(243,245,242,0.76);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }
    .settingsTabBtn:hover{

    }
    .settingsTabBtn.isActive{

      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%),

      color: #ffffff;
      box-shadow:

        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #settingsTabPanels{
      min-height: 0;
      overflow: hidden;
    }
    .settingsTabPane{
      height: 100%;
      display: none;
    }
    .settingsTabPane.isActive{
      display: block;
    }
    .settingsPaneInner{
      height: 100%;
      overflow: hidden;
    }
    .settingsSection{
      height: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      padding: 14px;
      box-sizing: border-box;
      overflow: hidden;
    }
    .settingsSectionTitle{

      font-weight: 800;
      margin-bottom: 12px;
    }
    .settingsSectionNote{

    }
    .settingsToggleRow{

    }
    .settingsCheck{

      font-weight: 800;

  <script>
    (function(){
      const BOARD_W = 1600;
      const BOARD_H = 900;

      function fitGameBoard(){
        const viewport = document.getElementById("boardViewport");
        const board = document.querySelector(".gameBoard");
        if (!viewport || !board) return;

        const rect = viewport.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        const scale = Math.min(rect.width / BOARD_W, rect.height / BOARD_H);

        board.style.width = BOARD_W + "px";
        board.style.height = BOARD_H + "px";
        board.style.left = "50%";
        board.style.top = "50%";
        board.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      function requestFit(){
        requestAnimationFrame(fitGameBoard);
      }

      window.fitGameBoard = fitGameBoard;

      document.addEventListener("DOMContentLoaded", requestFit);
      window.addEventListener("load", requestFit);
      window.addEventListener("resize", requestFit);
      window.addEventListener("orientationchange", requestFit);

      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", requestFit);
        window.visualViewport.addEventListener("scroll", requestFit);
      }

      if (window.ResizeObserver){
        let ro = null;
        document.addEventListener("DOMContentLoaded", ()=>{
          const viewport = document.getElementById("boardViewport");
          if (!viewport) return;
          ro = new ResizeObserver(requestFit);
          ro.observe(viewport);
        });
      }
    })();
  </script>
