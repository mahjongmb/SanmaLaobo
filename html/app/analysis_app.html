<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SANMA LAB / 分析</title>
  <meta name="description" content="検証モードで保存した対局から、全体の傾向を確認できるページです。" />
  <style>
    :root{
      --bg:#08120e;
      --bg2:#103126;
      --panel:rgba(8,20,15,0.84);
      --panel-strong:rgba(15,31,24,0.94);
      --panel-soft:rgba(255,255,255,0.04);
      --line:rgba(255,255,255,0.12);
      --text:#f6f7f3;
      --muted:rgba(246,247,243,0.72);
      --gold:#d9bb72;
      --gold-strong:#f3d78e;
      --accent:#8dd8c4;
      --danger:#ffb7ac;
      --shadow:0 18px 54px rgba(0,0,0,0.32);
    }

    *{ box-sizing:border-box; }
    html, body{ margin:0; min-height:100%; }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% 12%, rgba(241,212,141,0.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(31,94,67,0.26), transparent 36%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 58%, #050c09 100%);
      overflow-x:hidden;
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      border-radius:50%;
      opacity:0.52;
      filter:blur(2px);
    }

    body::before{
      width:360px;
      height:360px;
      top:-120px;
      left:-120px;
      background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    }

    body::after{
      width:320px;
      height:320px;
      right:-100px;
      bottom:-100px;
      background:radial-gradient(circle, rgba(217,187,114,0.16), transparent 68%);
    }

    button,
    select,
    a{
      color:inherit;
      font:inherit;
    }

    .page{
      width:min(100%, 1440px);
      margin:0 auto;
      padding:24px;
      position:relative;
      z-index:1;
    }

    .shell{
      border-radius:30px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--panel);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      overflow:hidden;
      position:relative;
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:-160px auto auto 50%;
      width:380px;
      height:380px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(217,187,114,0.14), transparent 70%);
      pointer-events:none;
    }

    .shellInner{
      position:relative;
      z-index:1;
      padding:24px;
      display:grid;
      gap:18px;
    }

    .topRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }

    .topRowLeft{
      display:grid;
      gap:10px;
      min-width:0;
      flex:1 1 640px;
    }

    .topActions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:nowrap;
      width:100%;
      min-width:0;
    }

    .topActionsLeft,
    .topActionsRight{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:nowrap;
      min-width:0;
      flex:0 0 auto;
    }

    .topActionsRight{
      margin-left:auto;
    }

    .backBtn,
    .refreshBtn,
    .hintBtn,
    .tabBtn{
      appearance:none;
      border:none;
      cursor:pointer;
      min-height:44px;
      padding:0 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      transition:transform 0.16s ease, opacity 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }

    .backBtn:hover,
    .refreshBtn:hover,
    .hintBtn:hover,
    .tabBtn:hover,
    .filterSelect:hover{
      transform:translateY(-1px);
    }

    .backBtn{
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      color:#1e1402;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .refreshBtn,
    .hintBtn,
    .tabBtn{
      background:rgba(255,255,255,0.06);
      color:var(--text);
      border:1px solid rgba(255,255,255,0.12);
    }

    .tabBtn.isActive{
      background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06)), rgba(76,119,98,0.78);
      border-color:rgba(182,227,201,0.24);
      color:#ffffff;
      box-shadow:0 10px 18px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .brandKicker{
      font-size:12px;
      font-weight:800;
      letter-spacing:0.22em;
      color:var(--gold-strong);
    }

    .brandTitle{
      font-size:clamp(34px, 5vw, 64px);
      font-weight:900;
      line-height:1;
      letter-spacing:0.05em;
      text-shadow:0 10px 28px rgba(0,0,0,0.24);
    }

    .brandSub{
      font-size:clamp(18px, 2vw, 24px);
      font-weight:800;
      color:rgba(255,255,255,0.92);
    }

    .leadText{
      margin:0;
      font-size:14px;
      line-height:1.9;
      color:var(--muted);
      max-width:58em;
    }

    .statusCard{
      min-width:0;
      max-width:none;
      padding:6px 10px;
      border-radius:14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.10);
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
    }

    .statusHead{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }

    .statusLabel{
      font-size:11px;
      font-weight:800;
      letter-spacing:0.10em;
      color:var(--gold-strong);
      white-space:nowrap;
    }

    .statusBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .statusBadge.isAccount{
      color:#1b1403;
      background:linear-gradient(180deg, #f2d58f 0%, #d9bb72 100%);
      border-color:transparent;
    }

    .statusBadge.isLocal{
      color:rgba(255,255,255,0.9);
    }

    .statusNote{
      font-size:13px;
      line-height:1.7;
      color:var(--muted);
    }

    .statusMeta,
    .tabRow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .miniPill{
      display:inline-flex;
      align-items:center;
      min-height:30px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(141,216,196,0.12);
      border:1px solid rgba(141,216,196,0.18);
      color:#f7fffb;
      font-size:12px;
      font-weight:700;
    }

    .filterCard,
    .messageCard,
    .metricSection,
    .placeholderSection,
    .tabCard,
    .chartCard,
    .tableCard{
      border-radius:22px;
      border:1px solid rgba(255,255,255,0.10);
      background:var(--panel-soft);
      padding:18px;
    }

    .filterCardTitle,
    .messageTitle,
    .sectionTitle,
    .tabTitle,
    .chartTitle,
    .tableTitle{
      font-size:18px;
      font-weight:900;
      margin-bottom:10px;
    }

    .sectionSub,
    .messageText,
    .placeholderText,
    .filterNote,
    .tabSub,
    .chartSub,
    .tableSub{
      font-size:13px;
      line-height:1.75;
      color:var(--muted);
    }

    .filterGrid,
    .summaryGrid,
    .metricGrid{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .compactControlRow{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      width:auto;
      flex:0 0 auto;
    }

    .compactFilterBox{
      display:flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(255,255,255,0.03);
      flex:0 0 auto;
    }

    .compactFilterLabel{
      font-size:11px;
      font-weight:800;
      letter-spacing:0.04em;
      color:var(--gold-strong);
      white-space:nowrap;
    }

    .compactFilterBox .filterSelect{
      width:108px;
      min-height:30px;
      padding:0 10px;
      border-radius:10px;
      font-size:12px;
    }

    .filterGrid{
      grid-template-columns:repeat(4, minmax(0, 1fr));
    }

    .summaryGrid{
      grid-template-columns:repeat(6, minmax(0, 1fr));
    }

    .metricGrid{
      grid-template-columns:repeat(4, minmax(0, 1fr));
    }

    .filterField{
      display:grid;
      gap:7px;
    }

    .filterLabel{
      font-size:12px;
      font-weight:800;
      color:rgba(245,247,244,0.76);
    }

    .filterSelect{
      width:100%;
      min-height:42px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.05);
      color:var(--text);
      padding:0 12px;
      box-sizing:border-box;
      transition:transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .metricCard{
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(0,0,0,0.16);
      padding:14px 13px;
      display:grid;
      gap:6px;
      min-height:108px;
    }

    .metricCardLabel{
      font-size:12px;
      font-weight:700;
      color:rgba(245,247,244,0.64);
    }

    .metricCardValue{
      font-size:24px;
      font-weight:900;
      line-height:1.05;
      color:#ffd56f;
      word-break:break-word;
    }

    .metricCardHint{
      font-size:11px;
      color:rgba(245,247,244,0.48);
      line-height:1.45;
    }

    .tabPanel{
      display:none;
    }

    .tabPanel.isActive{
      display:block;
    }

    .placeholderSection{
      display:grid;
      gap:10px;
      background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
    }

    .placeholderList{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
    }

    .placeholderItem{
      border-radius:14px;
      border:1px dashed rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.03);
      padding:12px;
      display:grid;
      gap:6px;
    }

    .placeholderItemTitle{
      font-size:13px;
      font-weight:800;
      color:#fff3c5;
    }

    .placeholderItemText{
      font-size:12px;
      line-height:1.7;
      color:var(--muted);
    }

    .emptyCard{
      border-radius:18px;
      border:1px dashed rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.03);
      padding:18px;
      font-size:14px;
      line-height:1.8;
      color:rgba(245,247,244,0.82);
    }

    .messageCard.warn{
      border-color:rgba(255,183,172,0.22);
      background:rgba(255,183,172,0.08);
    }

    .messageCard.ok{
      border-color:rgba(141,216,196,0.20);
      background:rgba(141,216,196,0.08);
    }

    @media (max-width: 1180px){
      .summaryGrid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }

      .metricGrid,
      .filterGrid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .placeholderList{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px){
      .page{ padding:16px; }
      .shellInner{ padding:16px; }
      .topRow{ gap:12px; }
      .statusCard{ width:auto; }
      .topActions{
        align-items:flex-start;
        flex-wrap:wrap;
      }
      .topActionsLeft,
      .topActionsRight{
        flex-wrap:wrap;
      }
      .topActionsRight{
        width:100%;
        justify-content:flex-start;
        margin-left:0;
      }
      .compactControlRow{
        justify-content:flex-start;
      }
      .compactFilterBox{
        width:auto;
      }
      .summaryGrid,
      .metricGrid,
      .filterGrid,
      .placeholderList{
        grid-template-columns:1fr;
      }
      .brandTitle{ letter-spacing:0.03em; }
    }
  </style>

<body>
  <main class="page">
    <section class="shell" aria-label="分析ページ">
      <div class="shellInner">
        <div class="topRow">
          <div class="topRowLeft">
            <div class="topActions">
              <div class="topActionsLeft">
                <a class="backBtn" href="index_app.html">トップに戻る</a>
                <button id="analysisRefreshBtn" type="button" class="refreshBtn">再読み込み</button>
                <button id="analysisHintBtn" type="button" class="hintBtn">見方</button>
                <button id="analysisBenchBtn" type="button" class="hintBtn">10kベンチ</button>
                <button id="analysisBenchClearBtn" type="button" class="hintBtn">ベンチ消去</button>
              </div>
              <div class="topActionsRight">
                <aside class="statusCard" aria-label="分析対象">
                  <div class="statusHead">
                    <div class="statusLabel">集計対象</div>
                    <div id="analysisSessionBadge" class="statusBadge isLocal">ローカル</div>
                  </div>
                </aside>
                <div class="compactControlRow" aria-label="対象半荘数">
                  <div class="compactFilterBox">
                    <div class="compactFilterLabel">対象半荘数</div>
                    <select id="filterLimit" class="filterSelect">
                      <option value="all">すべて</option>
                      <option value="20">最新20</option>
                      <option value="50">最新50</option>
                      <option value="100">最新100</option>
                      <option value="200">最新200</option>
                    </select>
                  </div>
                </div>
                <div class="compactControlRow" aria-label="対象ルール">
                  <div class="compactFilterBox">
                    <div class="compactFilterLabel">対象ルール</div>
                    <select id="filterRuleSetId" class="filterSelect">
                      <option value="all">すべて</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
            <div class="brandKicker">SANMA LAB / 検証結果まとめ</div>
            <div class="brandTitle">分析ページ</div>
            <div class="brandSub">保存した検証対局の傾向を見る</div>
            <p class="leadText">
              検証モードで保存した対局をもとに、打ち筋や結果の傾向を見返せるページです。<br />
              和了しやすさ、放銃の出やすさ、打点の傾向などを、ひと目で確認できます。<br />
              ルールや設定を変えたときの違いを見比べたいときに向いています。
            </p>
            <div id="analysisBenchResult"></div>
          </div>
        </div>

        <div id="analysisAppRoot"></div>
      </div>
    </section>
  </main>

  <script src="../../js/match_log.js"></script>
  <script src="../../js/log_normalizer.js"></script>
  <script src="../../js/log_metrics.js"></script>
  <script>
    (function(){
      "use strict";

      const FILTER_STORAGE_KEY = "mbsanma_analysis_app_filters_v1";
      const ACTIVE_SESSION_STORAGE_KEY = "mbsanma_app_active_session_v1";
      const LEGACY_ACTIVE_SESSION_STORAGE_KEY = "mbsanma_visitor_active_session_v1";
      const CURRENT_LOGIN_ACCOUNT_STORAGE_KEY = "mbsanma_app_current_login_account_v1";

      const TAB_KEYS = ["overview", "agari", "riichi", "loss", "flow", "yaku"];
      const TAB_LABELS = {
        overview: "全体",
        agari: "和了",
        riichi: "リーチ",
        loss: "放銃 / 被ツモ",
        flow: "流局 / 進行",
        yaku: "役"
      };

      const filterEls = {
        limit: document.getElementById("filterLimit"),
        ruleSetId: document.getElementById("filterRuleSetId")
      };

      const refreshBtn = document.getElementById("analysisRefreshBtn");
      const hintBtn = document.getElementById("analysisHintBtn");
      const benchBtn = document.getElementById("analysisBenchBtn");
      const benchClearBtn = document.getElementById("analysisBenchClearBtn");
      const benchResultRoot = document.getElementById("analysisBenchResult");
      const root = document.getElementById("analysisAppRoot");
      const badgeEl = document.getElementById("analysisSessionBadge");

      const state = {
        filters: loadFilters(),
        activeTab: "overview"
      };

      function normalizeAccountId(value){
        return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function loadFilters(){
        try{
          const raw = localStorage.getItem(FILTER_STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : null;
          const normalized = window.MBSanmaLogMetrics.normalizeAnalysisFilters(parsed);
          return {
            ...normalized,
            limit: ["20", "50", "100", "200", "all"].includes(String(parsed && parsed.limit || "")) ? String(parsed.limit) : "all",
            matchMode: "batch",
            sessionMode: "all",
            dealer: "all",
            ruleSetId: String(parsed && parsed.ruleSetId || "all")
          };
        }catch(e){
          return {
            ...window.MBSanmaLogMetrics.normalizeAnalysisFilters(null),
            limit: "all",
            matchMode: "batch",
            sessionMode: "all",
            dealer: "all",
            ruleSetId: "all"
          };
        }
      }

      function saveFilters(){
        try{
          localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(state.filters));
        }catch(e){}
      }

      function syncRuleSetFilterOptions(logs){
        const select = filterEls.ruleSetId;
        if (!select) return;
        if (!window.MBSanmaLogMetrics || typeof window.MBSanmaLogMetrics.listAnalysisRuleSetOptions !== "function") return;
        const options = window.MBSanmaLogMetrics.listAnalysisRuleSetOptions(logs);
        const seen = Object.create(null);
        const merged = [];
        options.forEach((item)=> {
          seen[item.value] = true;
          merged.push(item);
        });
        try{
          const rawPresetStore = localStorage.getItem("mbsanma_rules_presets_v1");
          const parsedPresetStore = rawPresetStore ? JSON.parse(rawPresetStore) : null;
          const slots = parsedPresetStore && parsedPresetStore.slots && typeof parsedPresetStore.slots === "object" ? parsedPresetStore.slots : {};
          ["slot1", "slot2", "slot3", "slot4", "slot5"].forEach((slotId, index)=> {
            if (seen[slotId]) return;
            const entry = slots[slotId] && typeof slots[slotId] === "object" ? slots[slotId] : null;
            const name = entry && entry.name ? String(entry.name) : `プリセット${index + 1}`;
            merged.push({ value: slotId, label: name });
            seen[slotId] = true;
          });
        }catch(e){}
        if (!seen.standard){
          merged.splice(1, 0, { value: "standard", label: "標準ルール" });
          seen.standard = true;
        }
        const currentValue = String(state.filters.ruleSetId || "all");
        select.innerHTML = "";
        merged.forEach((item)=> {
          const option = document.createElement("option");
          option.value = item.value;
          option.textContent = item.label;
          if (item.value === currentValue) option.selected = true;
          select.appendChild(option);
        });
        if (!merged.some((item)=> item.value === currentValue)){
          state.filters.ruleSetId = "all";
          select.value = "all";
        }
      }

      function writeActiveSessionSnapshot(mode, accountId){
        const payload = {
          mode: mode === "account" ? "account" : "local",
          accountId: mode === "account" ? normalizeAccountId(accountId) : ""
        };
        try{
          const serialized = JSON.stringify(payload);
          sessionStorage.setItem(ACTIVE_SESSION_STORAGE_KEY, serialized);
          sessionStorage.setItem(LEGACY_ACTIVE_SESSION_STORAGE_KEY, serialized);
        }catch(e){}
        return payload;
      }

      function readActiveSession(){
        try{
          const loginId = normalizeAccountId(localStorage.getItem(CURRENT_LOGIN_ACCOUNT_STORAGE_KEY) || "");
          if (loginId) return writeActiveSessionSnapshot("account", loginId);
        }catch(e){}

        const keys = [ACTIVE_SESSION_STORAGE_KEY, LEGACY_ACTIVE_SESSION_STORAGE_KEY];
        for (const key of keys){
          try{
            const raw = sessionStorage.getItem(key);
            if (!raw) continue;
            const parsed = JSON.parse(raw);
            const mode = parsed && parsed.mode === "account" ? "account" : (parsed && parsed.mode === "local" ? "local" : "");
            if (!mode) continue;
            return writeActiveSessionSnapshot(mode, mode === "account" ? normalizeAccountId(parsed && parsed.accountId || "") : "");
          }catch(e){}
        }

        return writeActiveSessionSnapshot("local", "");
      }

      function syncTopStatus(summary){
        const session = readActiveSession();
        if (badgeEl){
          if (session.mode === "account" && session.accountId){
            badgeEl.textContent = session.accountId;
            badgeEl.classList.remove("isLocal");
            badgeEl.classList.add("isAccount");
          } else {
            badgeEl.textContent = "ローカル";
            badgeEl.classList.remove("isAccount");
            badgeEl.classList.add("isLocal");
          }
        }
      }

      function formatBenchmarkBytes(bytes){
        const n = Number(bytes) || 0;
        if (n >= 1024 * 1024) return `${(n / (1024 * 1024)).toFixed(1)} MB`;
        if (n >= 1024) return `${(n / 1024).toFixed(1)} KB`;
        return `${n} B`;
      }

      function formatBenchmarkResult(result){
        if (!result || typeof result !== "object") return "ベンチ結果を取得できませんでした。";
        const lines = [
          `保存先: ${result.storageBackend === "indexeddb" ? "IndexedDB" : "localStorage"}`,
          `投入件数: ${Number(result.writtenMatchCount) || 0} / 要求 ${Number(result.requestedMatchCount) || 0} 半荘`,
          `1半荘あたり局数: ${Number(result.kyokuPerMatch) || 0}`,
          `推定サイズ: ${formatBenchmarkBytes(result.estimatedBytes)}`,
          `生成: ${Number(result.buildMs) || 0} ms`,
          `旧ベンチ消去: ${Number(result.clearMs) || 0} ms`,
          `保存: ${Number(result.writeMs) || 0} ms`,
          `読込: ${Number(result.readMs) || 0} ms`
        ];
        if (result.summaryMs != null){
          lines.push(`分析集計: ${Number(result.summaryMs) || 0} ms`);
        }
        if (result.summaryKyokuCount != null){
          lines.push(`集計対象局数: ${Number(result.summaryKyokuCount) || 0}`);
        }
        const snapshot = result.summarySnapshot && typeof result.summarySnapshot === "object" ? result.summarySnapshot : null;
        if (snapshot){
          lines.push("");
          lines.push("実集計サマリー:");
          lines.push(`リーチ率: ${formatRate(snapshot.riichiRate)}`);
          lines.push(`副露率: ${formatRate(snapshot.openRate)}`);
          lines.push(`和了率: ${formatRate(snapshot.agariRate)}`);
          lines.push(`放銃率: ${formatRate(snapshot.hojuRate)}`);
          lines.push(`被ツモ率: ${formatRate(snapshot.hitByTsumoRate)}`);
          lines.push(`流局率: ${formatRate(snapshot.ryukyokuRate)}`);
          lines.push(`平均打点: ${formatAvgPoint(snapshot.averagePoint)}`);
          lines.push(`平均進行巡目: ${formatAvgJunme(snapshot.averageJunmePerKyoku)}`);
          lines.push(`平均ドラ枚数: ${formatAvgCount(snapshot.averageDoraCount, "枚")}`);
          lines.push(`平均リーチ巡目: ${formatAvgJunme(snapshot.riichiAverageJunme)}`);
          lines.push(`リーチ時平均打点: ${formatAvgPoint(snapshot.riichiAveragePoint)}`);
          lines.push(`リーチ時和了率: ${formatRate(snapshot.riichiAgariRate)}`);
          lines.push(`副露時和了率: ${formatRate(snapshot.openAgariRate)}`);
        }
        return lines.join("\n");
      }

        if (!benchResultRoot) return;
        benchResultRoot.innerHTML = "";
        const card = document.createElement("section");
        card.className = "messageCard";

        if (kind === "error") card.classList.add("isError");

        const titleEl = document.createElement("div");
        titleEl.className = "messageTitle";
        titleEl.textContent = title || "";
        const bodyEl = document.createElement("div");
        bodyEl.className = "messageBody";
        bodyEl.innerHTML = String(body || "").replace(/\n/g, "<br>");
        card.appendChild(titleEl);
        card.appendChild(bodyEl);
        benchResultRoot.appendChild(card);

      async function getStoredLogsAsync(){
        try{
          if (window.MBSanmaMatchLog){
            if (typeof window.MBSanmaMatchLog.getStoredLogsAsync === "function"){
              const logs = await window.MBSanmaMatchLog.getStoredLogsAsync();
              return Array.isArray(logs) ? logs.filter((item)=> item && typeof item === "object") : [];
            }
            if (typeof window.MBSanmaMatchLog.getStoredLogs === "function"){
              const logs = window.MBSanmaMatchLog.getStoredLogs();
              return Array.isArray(logs) ? logs.filter((item)=> item && typeof item === "object") : [];

      function formatRate(value){
        return Number.isFinite(value) ? `${(value * 100).toFixed(1)}%` : "—";
      }

      function formatAvgScore(value){
        return Number.isFinite(value) ? `${value > 0 ? "+" : ""}${value.toFixed(1)}` : "—";
      }

      function formatAvgPoint(value){
        return Number.isFinite(value) ? `${Math.round(value).toLocaleString("ja-JP")}点` : "—";
      }

      function formatAvgJunme(value){
        return Number.isFinite(value) ? `${value.toFixed(2)}巡目` : "—";
      }

      function formatAvgCount(value, suffix = ""){
        return Number.isFinite(value) ? `${value.toFixed(2)}${suffix}` : "—";
      }

      function formatCount(value){
        return `${Number(value) || 0}`;
      }

      function formatModeCount(summary){
        const parts = [];
        if (summary.matchCounts.batch > 0) parts.push(`検証 ${summary.matchCounts.batch}`);
        if (summary.matchCounts.normal > 0) parts.push(`対局 ${summary.matchCounts.normal}`);
        if (summary.matchCounts.unknown > 0) parts.push(`未分類 ${summary.matchCounts.unknown}`);
        return parts.length ? parts.join(" / ") : "—";
      }

      async function render(){
        if (!root) return;

        Object.keys(filterEls).forEach((key)=> {
          if (filterEls[key]) filterEls[key].value = state.filters[key];
        });

        renderLoading();

        const logs = await getStoredLogsAsync();
        syncRuleSetFilterOptions(logs);
        const summary = window.MBSanmaLogMetrics.buildAnalysisSummary(logs, state.filters);
        syncTopStatus(summary);

        root.innerHTML = "";

        if (summary.overall.kyokuCount <= 0){
          const empty = document.createElement("section");
          empty.className = "emptyCard";
          empty.innerHTML = "条件に合う局がまだありません。<br>まずは検証モードで半荘を終わらせて保存するか、条件を広げてみてください。";
          root.appendChild(empty);
          return;
        }

        root.appendChild(createSummarySection(summary));
        root.appendChild(createTabRow());
        buildTabPanels(summary).forEach((panel)=> root.appendChild(panel));

        if (summary.availability.pointDataCount <= 0 && summary.availability.yakuDataCount <= 0){
          root.appendChild(createMessageCard(
            "warn",
            "役や打点の詳しい表示は一部準備中です",
            "役の組み合わせや点数の詳しい内容は、保存されている対局データがある分から順に反映しています。今後さらに見やすく増やしていきます。"
          ));
        } else {
          root.appendChild(createMessageCard(
            "ok",
            "役や打点の詳しい情報も表示できます",
            `点数データ ${summary.availability.pointDataCount}件 / 役データ ${summary.availability.yakuDataCount}件 / ドラデータ ${summary.availability.doraDataCount}件 を使って表示しています。`
          ));
        }

      }

      Object.keys(filterEls).forEach((key)=> {
        const el = filterEls[key];
        if (!el) return;
        el.addEventListener("change", ()=> {
          state.filters[key] = String(el.value || "");
          state.filters = {
            ...window.MBSanmaLogMetrics.normalizeAnalysisFilters(state.filters),
            matchMode: "batch",
            sessionMode: "all",
            dealer: "all",
            ruleSetId: String(state.filters.ruleSetId || "all")
          };
          saveFilters();
          render().catch(()=>{});
        });
      });

      if (refreshBtn){
        refreshBtn.addEventListener("click", ()=> render().catch(()=>{}));
      }

      if (hintBtn){
        hintBtn.addEventListener("click", ()=> {
          alert([
            "このページでは、検証モードで保存した対局をまとめて振り返れます。",
            "",
            "和了率や放銃率、平均打点、よく出る役などをまとめて確認できます。",
            "ルールや設定を変えたときの違いを見たいときに便利です。",
            "",
            "自分の半荘成績を見たい場合は、成績管理ページを使ってください。"
          ].join("\n"));
        });
      }

      if (benchBtn){
        benchBtn.addEventListener("click", async ()=> {
          if (!window.MBSanmaMatchLog || typeof window.MBSanmaMatchLog.runBatchBenchmarkAsync !== "function"){
            renderBenchmarkResult("error", "10kベンチを利用できません", "このページではベンチ機能を呼び出せません。");
            return;
          }
          const before = benchBtn.textContent;
          benchBtn.disabled = true;
          benchBtn.textContent = "実測中...";
          renderBenchmarkResult("warn", "10kベンチを実行しています", "10000半荘相当の軽量batchログを別スコープへ保存し、保存・読込・分析集計の時間を測っています。");
          try{
            const result = await window.MBSanmaMatchLog.runBatchBenchmarkAsync({
              matchCount: 10000,
              kyokuPerMatch: 8
            });
            renderBenchmarkResult("ok", "10000半荘ベンチが完了しました", `${formatBenchmarkResult(result)}\n\nこのベンチは実データとは別スコープへ保存しています。`);
          }catch(e){
            renderBenchmarkResult("error", "10kベンチに失敗しました", e && e.message ? e.message : String(e || ""));
          }finally{
            benchBtn.disabled = false;
            benchBtn.textContent = before;
          }
        });
      }

      if (benchClearBtn){
        benchClearBtn.addEventListener("click", async ()=> {
          if (!window.MBSanmaMatchLog || typeof window.MBSanmaMatchLog.clearBatchBenchmarkAsync !== "function"){
            renderBenchmarkResult("error", "ベンチ消去を利用できません", "このページではベンチ消去機能を呼び出せません。");
            return;
          }
          const before = benchClearBtn.textContent;
          benchClearBtn.disabled = true;
          benchClearBtn.textContent = "消去中...";
          try{
            const result = await window.MBSanmaMatchLog.clearBatchBenchmarkAsync();
            renderBenchmarkResult("ok", "ベンチ用ログを消去しました", `${Number(result && result.removedCount) || 0} 件を削除しました。`);
          }catch(e){
            renderBenchmarkResult("error", "ベンチ消去に失敗しました", e && e.message ? e.message : String(e || ""));
          }finally{
            benchClearBtn.disabled = false;
            benchClearBtn.textContent = before;
          }
        });
      }

      render().catch(()=>{});
    })();
  </script>
</body>
</html>
