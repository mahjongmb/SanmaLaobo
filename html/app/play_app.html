<!doctype html>

  <title>MBサンマアプリ版</title>

  <script>
    (function(){
      window.MBSANMA_ASSET_PREFIX = "../../";
      const ACTIVE_SESSION_STORAGE_KEY = "mbsanma_app_active_session_v1";
      const LEGACY_ACTIVE_SESSION_STORAGE_KEY = "mbsanma_visitor_active_session_v1";

      function normalizeSession(src){
        const mode = src && src.mode === "account" ? "account" : (src && src.mode === "local" ? "local" : "");
        return {
          mode,
          accountId: mode === "account" ? String(src && src.accountId || "") : ""
        };
      }

      function readSession(storageKey){
        try{
          const raw = sessionStorage.getItem(storageKey);
          if (!raw) return null;
          const parsed = normalizeSession(JSON.parse(raw));
          return parsed.mode ? parsed : null;
        }catch(e){
          return null;
        }
      }

      const current = readSession(ACTIVE_SESSION_STORAGE_KEY);
      if (current){
        return;
      }

      const legacy = readSession(LEGACY_ACTIVE_SESSION_STORAGE_KEY);
      if (legacy){
        try{
          sessionStorage.setItem(ACTIVE_SESSION_STORAGE_KEY, JSON.stringify(legacy));
        }catch(e){}
        return;
      }

      location.replace("index_app.html");
    })();
  </script>

  <style>
    :root{
      --appChromeBorder: rgba(255, 248, 230, 0.14);
      --appChromePanel:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%),
        linear-gradient(135deg, rgba(25, 37, 31, 0.94) 0%, rgba(10, 15, 13, 0.96) 100%);
      --appChromeShadow:
        0 22px 52px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }
    body{
      background:
        radial-gradient(circle at top, rgba(111, 158, 118, 0.16) 0%, rgba(111, 158, 118, 0) 32%),
        linear-gradient(180deg, #0c1511 0%, #09100d 52%, #050807 100%);
    }
    .app{
      position: relative;
      isolation: isolate;
    }
    .app::before{
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 14%, rgba(209, 180, 108, 0.10) 0%, rgba(209, 180, 108, 0) 22%),
        radial-gradient(circle at 84% 12%, rgba(113, 171, 150, 0.10) 0%, rgba(113, 171, 150, 0) 24%),
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 20%);
      z-index: -2;
    }
    .boardStage{
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 34%, rgba(255,255,255,0) 62%);
    }
    .boardViewport::before{
      content: "";
      position: absolute;
      inset: 24px;
      border-radius: 36px;
      border: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 30px 80px rgba(0,0,0,0.20);
      pointer-events: none;
    }
    .gameBoard{
      border-radius: 34px;
      box-shadow:
        0 42px 90px rgba(0,0,0,0.46),
        0 0 0 1px rgba(255,255,255,0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .gameBoard::before,
    .gameBoard::after{
      content: "";
      position: absolute;
      pointer-events: none;
    }
    .gameBoard::before{
      inset: 0;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.02) 16%, rgba(255,255,255,0) 28%);
      mix-blend-mode: screen;
    }
    .gameBoard::after{
      left: 34px;
      right: 34px;
      top: 18px;
      height: 86px;
      border-radius: 999px;
      background: radial-gradient(circle at center, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 72%);
      opacity: 0.8;
    }
    #settingsOverlay{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.58);
      z-index: 4000;
      padding: 20px;
      box-sizing: border-box;
    }
    #settingsPanel{
      width: min(920px, 96vw);
      min-height: min(620px, 84vh);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(18, 24, 20, 0.96);
      color: #f3f5f2;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 16px;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.45);
      padding: 18px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }
    #settingsHeader{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex: 0 0 auto;
    }
    #settingsTitleWrap{
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #settingsTitle{
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
    }
    #settingsSubTitle{
      font-size: 12px;
      opacity: 0.72;
      line-height: 1.3;
    }
    #settingsCloseBtn{
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
    }
    #settingsBody{
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }
    #settingsTabs{
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      flex: 0 0 auto;
    }
    .settingsTabBtn{
      appearance: none;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      min-height: 42px;
      padding: 0 14px;
      background: rgba(255,255,255,0.04);
      color: rgba(243,245,242,0.76);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }
    .settingsTabBtn:hover{
      transform: translateY(-1px);
    }
    .settingsTabBtn.isActive{
      border-color: rgba(182, 227, 201, 0.24);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%),
        rgba(62, 101, 81, 0.82);
      color: #ffffff;
      box-shadow:
        0 10px 18px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    #settingsTabPanels{
      min-height: 0;
      overflow: hidden;
    }
    .settingsTabPane{
      height: 100%;
      display: none;
    }
    .settingsTabPane.isActive{
      display: block;
    }
    .settingsPaneInner{
      height: 100%;
      overflow: hidden;
    }
    .settingsSection{
      height: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 14px;
      padding: 14px;
      box-sizing: border-box;
      overflow: hidden;
    }
    .settingsSectionTitle{
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .settingsSectionNote{
      display: none;
    }
    .settingsToggleRow{
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .settingsCheck{
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .settingsSegment{
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .settingsSegmentBtn{
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      min-height: 34px;
      padding: 0 14px;
      background: rgba(255,255,255,0.04);
      color: rgba(243,245,242,0.78);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition:
        background 140ms ease,
        color 140ms ease,
        transform 140ms ease,
        box-shadow 140ms ease,
        border-color 140ms ease;
    }
    .settingsSegmentBtn:hover{
      transform: translateY(-1px);
    }
    .settingsSegmentBtn.isActive{
      border-color: rgba(182, 227, 201, 0.28);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%),
        rgba(62, 101, 81, 0.82);
      color: #ffffff;
      box-shadow:
        0 8px 16px rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .settingsSeats{
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      height: 100%;
    }
    .settingsSeatCard{
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
    .settingsSeatTitle{
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    .settingsField{
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    .settingsField:last-child{
      margin-bottom: 0;
    }
    .settingsLabel{
      font-size: 13px;
      font-weight: 700;
      opacity: 0.92;
    }
    .settingsPlayerModeRow{
      display: grid;
      gap: 8px;
    }
    .settingsModeSwitch{
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: fit-content;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(0, 0, 0, 0.24);
      box-shadow:

    }
    .settingsModeSwitchBtn{
      appearance: none;
      border: 0;
      min-width: 112px;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      background: transparent;
      color: rgba(243, 245, 242, 0.82);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition:
        background 140ms ease,
        color 140ms ease,
        transform 140ms ease,
        box-shadow 140ms ease;
    }
    .settingsModeSwitchBtn:hover{
      transform: translateY(-1px);
    }
    .settingsModeSwitchBtn.isActive{
      background:
        linear-gradient(180deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.06) 100%),
        rgba(76, 119, 98, 0.78);
      color: #ffffff;
      box-shadow:
        0 10px 18px rgba(0,0,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.14);
    }
    .settingsModeSummary{
      display: grid;
      gap: 6px;
      margin-top: 4px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }
    .settingsModeSummaryItem{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(243, 245, 242, 0.88);
    }
    .settingsModeSummaryLabel{
      opacity: 0.72;
      font-weight: 700;
    }
    .settingsModeSummaryValue{
      font-weight: 800;
      color: #ffffff;
    }
    .settingsHint{
      display: none;
    }
    .settingsSelect{
      width: 100%;
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.28);
      color: #f3f5f2;
      padding: 8px 10px;
      box-sizing: border-box;
    }
    .settingsSelect:disabled{
      opacity: 0.42;
      cursor: not-allowed;
    }
    @media (orientation: landscape) and (max-height: 520px){
      #settingsOverlay{
        padding: 8px;
      }
      #settingsPanel{
        width: min(96vw, 1280px);
        min-height: 0;
        max-height: 96vh;
        padding: 10px 12px;
        border-radius: 14px;
      }
      #settingsHeader{
        gap: 8px;
        margin-bottom: 8px;
      }
      #settingsTitle{
        font-size: 18px;
      }
      #settingsSubTitle{
        display: none;
      }
      #settingsCloseBtn{
        min-height: 34px;
        padding: 0 12px;
        font-size: 12px;
      }
      #settingsBody{
        gap: 8px;
      }
      #settingsTabs{
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .settingsTabBtn{
        min-height: 34px;
        padding: 0 10px;
        font-size: 11px;
        border-radius: 10px;
      }
      #settingsTabPanels{
        min-height: 0;
      }
      .settingsPaneInner{
        height: 100%;
        overflow: auto;
      }
      .settingsSection{
        padding: 10px;
        overflow: auto;
      }
      .settingsSectionTitle{
        font-size: 14px;
        margin-bottom: 8px;
      }
      .settingsToggleRow{
        gap: 10px 14px;
      }
      .settingsCheck{
        font-size: 12px;
      }
      .settingsSegment{
        gap: 4px;
      }
      .settingsSegmentBtn{
        min-height: 30px;
        padding: 0 10px;
        font-size: 11px;
      }
      .settingsSeats{
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        height: auto;
      }
      .settingsSeatCard{
        padding: 10px;
      }
      .settingsSeatTitle{
        font-size: 13px;
        margin-bottom: 8px;
      }
      .settingsField{
        gap: 4px;
        margin-bottom: 8px;
      }
      .settingsLabel{
        font-size: 11px;
      }
      .settingsPlayerModeRow{
        gap: 8px;
      }
      .settingsModeSwitch{
        width: 100%;
        gap: 4px;
        padding: 4px;
      }
      .settingsModeSwitchBtn{
        min-width: 0;
        flex: 1 1 0;
        min-height: 34px;
        padding: 0 10px;
        font-size: 11px;
      }
      .settingsModeSummary{
        gap: 4px;
        margin-top: 2px;
        padding: 8px 10px;
      }
      .settingsModeSummaryItem{
        font-size: 10px;
        gap: 8px;
      }
      .settingsSelect{
        min-height: 34px;
        padding: 6px 8px;
        font-size: 12px;
      }
    }

    /* アプリ版専用：上部6ボタン（3×2） */

      align-items: center;
      gap: 9px;

      border: 1px solid rgba(255,255,255,0.12);

        linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.03) 100%),
        rgba(12, 19, 16, 0.74);
      box-shadow:
        0 18px 36px rgba(0,0,0,0.26),
        inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      max-width: calc(100vw - 68px);
      flex-wrap: nowrap;
    }
    .boardTopControls{
      top: 0.9%;
      width: auto;
      flex-direction: column;
      gap: 8px;
    }
    .boardTopAppControls{
      position: relative;
      display: grid !important;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, auto));
      gap: 10px 10px;
      width: 596px;
      max-width: 596px;
      align-items: stretch;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      padding: 0;
      border-radius: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      transform: translateY(-6px);
    }
    .boardTopAppControls::before{
      content: none;
    }
    .boardTopAppControls .topMenuBtn{
      position: relative;

        linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.05) 100%),
        linear-gradient(135deg, rgba(34, 47, 40, 0.92) 0%, rgba(15, 21, 18, 0.96) 100%) !important;
      box-shadow:
        0 12px 24px rgba(0,0,0,0.24),

    }
    .boardTopAppControls .topMenuBtn::before{

      background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 42%);

    }
    .boardTopAppControls .topMenuBtn:hover{

    (function(){
      const ACTIVE_SESSION_STORAGE_KEY = "mbsanma_app_active_session_v1";
      const LEGACY_ACTIVE_SESSION_STORAGE_KEY = "mbsanma_visitor_active_session_v1";
      const badge = document.getElementById("activeAccountBadge");

      if (!badge) return;

      function normalizeAccountId(value){
        return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function readActiveSession(){
        const keys = [ACTIVE_SESSION_STORAGE_KEY, LEGACY_ACTIVE_SESSION_STORAGE_KEY];
        for (const key of keys){
          try{
            const raw = sessionStorage.getItem(key);
            if (!raw) continue;
            const parsed = JSON.parse(raw);
            const mode = parsed && parsed.mode;
            if (mode === "account"){
              return {
                mode,
                accountId: normalizeAccountId(parsed && parsed.accountId || "")
              };
            }
            if (mode === "local"){
              return { mode, accountId: "" };
            }
          }catch(e){}
        }
        return { mode: "", accountId: "" };
      }

      function renderActiveAccountBadge(){
        const session = readActiveSession();

        if (session.mode === "account" && session.accountId){
          badge.textContent = `ID: ${session.accountId}`;
          badge.hidden = false;
          return;
        }

        badge.hidden = true;
        badge.textContent = "";
      }

      function bindTopBackButton(){
        const backBtn = document.getElementById("appTopBackBtn");
        if (!backBtn) return;
        backBtn.addEventListener("click", ()=>{
          location.href = "index_app.html";
        });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", ()=>{
          renderActiveAccountBadge();
          bindTopBackButton();
        }, { once: true });
      } else {
        renderActiveAccountBadge();
        bindTopBackButton();
      }
    })();
  </script>

  <script>
    (function(){
      const BOARD_W = 1600;
      const BOARD_H = 900;

      function fitGameBoard(){
        const viewport = document.getElementById("boardViewport");
        const board = document.querySelector(".gameBoard");
        if (!viewport || !board) return;

        const rect = viewport.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        const scale = Math.min(rect.width / BOARD_W, rect.height / BOARD_H);

        board.style.width = BOARD_W + "px";
        board.style.height = BOARD_H + "px";
        board.style.left = "50%";
        board.style.top = "50%";
        board.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      function requestFit(){
        requestAnimationFrame(fitGameBoard);
      }

      window.fitGameBoard = fitGameBoard;

      document.addEventListener("DOMContentLoaded", requestFit);
      window.addEventListener("load", requestFit);
      window.addEventListener("resize", requestFit);
      window.addEventListener("orientationchange", requestFit);

      if (window.visualViewport){
        window.visualViewport.addEventListener("resize", requestFit);
        window.visualViewport.addEventListener("scroll", requestFit);
      }

      if (window.ResizeObserver){
        let ro = null;
        document.addEventListener("DOMContentLoaded", ()=>{
          const viewport = document.getElementById("boardViewport");
          if (!viewport) return;
          ro = new ResizeObserver(requestFit);
          ro.observe(viewport);
        });
      }
    })();
  </script>

  <script>
    (function(){
      // ログイン中ならルール系キーをアカウント別に。ゲスト時は従来キーを使うので既存ユーザー非破壊。
      function getActiveAccountIdForRuleScope(){
        const normalize = (v)=> String(v || "").toUpperCase().replace(/[^A-Z0-9]/g, "");

        // 1) sessionStorage の active session を最優先
        try {
          const raw = sessionStorage.getItem("mbsanma_app_active_session_v1")
                   || sessionStorage.getItem("mbsanma_visitor_active_session_v1");
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && parsed.mode === "account") {
              const sid = normalize(parsed.accountId);
              if (sid) return sid;
            }
            if (parsed && parsed.mode === "local") return "";
          }
        } catch(e){}

        // 2) フォールバック: localStorage のログインアカウント
        try {
          const fromLocal = normalize(localStorage.getItem("mbsanma_app_current_login_account_v1"));
          if (fromLocal) return fromLocal;
        } catch(e){}

        // 3) さらにフォールバック: sessionStorage の個別キー
        try {
          const fromSession = normalize(sessionStorage.getItem("mbsanma_app_current_login_account_session_v1"));
          if (fromSession) return fromSession;
        } catch(e){}

        return "";
      }
      function buildScopedRuleStorageKey(baseKey){
        const accountId = getActiveAccountIdForRuleScope();
        if (!accountId) return baseKey;
        return "mbsanma_app_account_" + accountId + "_" + String(baseKey || "").replace(/^mbsanma_/, "");
      }

      const RULE_STORAGE_KEY = buildScopedRuleStorageKey("mbsanma_rules_settings_v1");
      const ACTIVE_RULE_SET_STORAGE_KEY = buildScopedRuleStorageKey("mbsanma_rules_active_v1");
      const LEGACY_RULE_UI_STORAGE_KEY = "mbsanma_rules_ui_v2"; // sessionStorage の UI フォールバック。スコープしない。
      const TILE_COMPOSITION_TILE_CODES = [
        "1m","9m",
        "1p","2p","3p","4p","5p","6p","7p","8p","9p",
        "1s","2s","3s","4s","5s","6s","7s","8s","9s",
        "1z","2z","3z","4z","5z","6z","7z"
      ];
      const TILE_COLOR_KEYS = ["r", "b", "g", "n"];

      function createEmptyTileColorCounts(){
        return { r: 0, b: 0, g: 0, n: 0 };
      }

      function createDefaultChipTargetTileSetting(){
        return {
          dora: false,
          doraCount: "0",
          chipValue: "0",
          targetMode: "menzen",
          useDetailedDora: false,
          useDetailedChip: false,
          doraMenzenCount: "0",
          doraFuroCount: "0",
          chipMenzenCount: "0",
          chipFuroCount: "0"
        };
      }

      function normalizeChipTargetTileSettingValue(value){
        const src = (value && typeof value === "object") ? value : {};
        let rawMode = String(src.targetMode != null ? src.targetMode : "menzen");
        if (rawMode !== "naki") rawMode = "menzen";

        const baseDoraCount = String(src.doraCount != null ? src.doraCount : "0");
        const baseChipValue = String(src.chipValue != null ? src.chipValue : "0");
        const useDetailedDora = !!src.useDetailedDora;
        const useDetailedChip = !!src.useDetailedChip;

        return {
          dora: !!src.dora,
          doraCount: baseDoraCount,
          chipValue: baseChipValue,
          targetMode: rawMode,
          useDetailedDora: useDetailedDora,
          useDetailedChip: useDetailedChip,
          doraMenzenCount: useDetailedDora
            ? String(src.doraMenzenCount != null ? src.doraMenzenCount : baseDoraCount)
            : baseDoraCount,
          doraFuroCount: useDetailedDora
            ? String(src.doraFuroCount != null ? src.doraFuroCount : baseDoraCount)
            : baseDoraCount,
          chipMenzenCount: useDetailedChip
            ? String(src.chipMenzenCount != null ? src.chipMenzenCount : baseChipValue)
            : baseChipValue,
          chipFuroCount: useDetailedChip
            ? String(src.chipFuroCount != null ? src.chipFuroCount : baseChipValue)
            : baseChipValue
        };
      }

      function cloneChipTargetSettingsValue(value){
        const src = (value && typeof value === "object") ? value : {};
        const out = {};
        Object.keys(src).forEach((tileCode)=> {
          out[tileCode] = normalizeChipTargetTileSettingValue(src[tileCode]);
        });
        return out;
      }

      function normalizeChipTargetSettingsValue(value){
        return cloneChipTargetSettingsValue(value);
      }

      function buildChipTargetOverviewBaseSetting(targetMode){
        return normalizeChipTargetTileSettingValue({
          targetMode: targetMode === "naki" ? "naki" : "menzen"
        });
      }

      function isChipTargetSettingSameAsOverview(setting, overviewMode){
        const base = buildChipTargetOverviewBaseSetting(overviewMode);
        const row = normalizeChipTargetTileSettingValue(setting);
        return (
          row.dora === base.dora &&
          row.doraCount === base.doraCount &&
          row.chipValue === base.chipValue &&
          row.targetMode === base.targetMode &&
          row.useDetailedDora === base.useDetailedDora &&
          row.useDetailedChip === base.useDetailedChip &&
          row.doraMenzenCount === base.doraMenzenCount &&
          row.doraFuroCount === base.doraFuroCount &&
          row.chipMenzenCount === base.chipMenzenCount &&
          row.chipFuroCount === base.chipFuroCount
        );
      }

      function compactChipTargetSettingsValue(value, overviewMode){
        const src = normalizeChipTargetSettingsValue(value);
        const out = {};
        Object.keys(src).forEach((tileCode)=> {
          const row = normalizeChipTargetTileSettingValue(src[tileCode]);
          if (!isChipTargetSettingSameAsOverview(row, overviewMode)) {
            out[tileCode] = row;
          }
        });
        return out;
      }

      function buildDefaultChipTargetSettings(){
        return normalizeChipTargetSettingsValue({
          "5p": {
            dora: true,
            doraCount: "1",
            chipValue: "1",
            targetMode: "menzen"
          },
          "5s": {
            dora: true,
            doraCount: "1",
            chipValue: "1",
            targetMode: "menzen"
          },
          "4z": {
            dora: true,
            doraCount: "1",
            chipValue: "1",
            targetMode: "naki"
          }
        });
      }

      function buildDefaultTileComposition(){
        const tiles = {};
        TILE_COMPOSITION_TILE_CODES.forEach((code)=> {
          tiles[code] = createEmptyTileColorCounts();
        });
        tiles["5p"].r = 2;
        tiles["5s"].r = 2;
        tiles["4z"].n = 1;
        return {
          version: 1,
          tiles
        };
      }

      function cloneTileCompositionValue(value){
        const src = (value && typeof value === "object") ? value : buildDefaultTileComposition();
        const srcTiles = (src.tiles && typeof src.tiles === "object") ? src.tiles : {};
        const out = {
          version: 1,
          tiles: {}
        };
        TILE_COMPOSITION_TILE_CODES.forEach((code)=> {
          const row = (srcTiles[code] && typeof srcTiles[code] === "object") ? srcTiles[code] : createEmptyTileColorCounts();
          out.tiles[code] = {
            r: Number(row.r) || 0,
            b: Number(row.b) || 0,
            g: Number(row.g) || 0,
            n: Number(row.n) || 0
          };
        });
        return out;
      }

      function normalizeTileCompositionValue(value){
        const base = cloneTileCompositionValue(value);
        const out = {
          version: 1,
          tiles: {}
        };

        TILE_COMPOSITION_TILE_CODES.forEach((code)=> {
          const srcRow = (base.tiles && base.tiles[code] && typeof base.tiles[code] === "object")
            ? base.tiles[code]
            : createEmptyTileColorCounts();
          const nextRow = createEmptyTileColorCounts();
          let used = 0;

          TILE_COLOR_KEYS.forEach((colorKey)=> {
            let count = Math.round(clampNumber(srcRow[colorKey], 0, 0, 4));
            if (!Number.isFinite(count) || count < 0) count = 0;
            if ((used + count) > 4) count = Math.max(0, 4 - used);
            nextRow[colorKey] = count;
            used += count;
          });

          out.tiles[code] = nextRow;
        });

        return out;
      }

      const DEFAULTS = Object.freeze({
        "overview-game-type": "hanchan",
        "overview-rate": "100p",
        "overview-chip-unit": "200",
        "overview-start-score": "35000",
        "overview-return-score": "40000",
        "overview-renchan-type": "tenpai",
        "overview-chip-target-ippatsu-ura": "both",
        "overview-chip-target-colored": "menzen",
        "overview-chip-target-shiro-pocchi": "off",
        "overview-chip-target-shiro-pocchi-count": "1",
        "score-uma-2": "-5",
        "score-uma-3": "-10",
        "score-kubi-enabled": "off",
        "score-kubi-point": "40000",
        "score-kubi-uma-2": "5",

      function readRawRuleState(){
        try{
          if (typeof localStorage !== "undefined"){
            const rawActive = localStorage.getItem(ACTIVE_RULE_SET_STORAGE_KEY);
            if (rawActive){
              const parsedActive = JSON.parse(rawActive);
              if (parsedActive && parsedActive.rules && typeof parsedActive.rules === "object") return parsedActive.rules;
            }
          }
        }catch(e){}

        try{
          if (typeof localStorage !== "undefined"){
            const raw = localStorage.getItem(RULE_STORAGE_KEY);
            if (raw) return JSON.parse(raw);
          }
        }catch(e){}

        try{
          if (typeof sessionStorage !== "undefined"){
            const legacy = sessionStorage.getItem(LEGACY_RULE_UI_STORAGE_KEY);
            if (legacy) return JSON.parse(legacy);
          }
        }catch(e){}

        return {};
      }

      function readActiveRuleSetMeta(){
        try{
          if (typeof localStorage !== "undefined"){
            const raw = localStorage.getItem(ACTIVE_RULE_SET_STORAGE_KEY);
            if (raw){
              const parsed = JSON.parse(raw);
              if (parsed && typeof parsed === "object"){
                return {
                  ruleSetId: String(parsed.presetId || "standard"),
                  ruleSetName: String(parsed.displayName || "標準ルール")
                };
              }
            }
          }
        }catch(e){}
        return {
          ruleSetId: "standard",
          ruleSetName: "標準ルール"
        };
      }

      function getChipTargetSettingStorageKey(tileCode){
        const code = String(tileCode || "");
        if (/^[rbgn]/.test(code) && code.length >= 3){
          return code.slice(1);
        }
        return code;
      }

      function renderAppliedRuleSetBadge(){
        const badgeEl = document.getElementById("boardTopRuleBadge");
        if (!badgeEl) return;
        const meta = readActiveRuleSetMeta();
        badgeEl.textContent = meta.ruleSetName;
        badgeEl.title = meta.ruleSetName;
      }

      function persistRuleState(state){
        const normalized = normalizeRuleState(state);
        try{
          if (typeof localStorage !== "undefined"){
            localStorage.setItem(RULE_STORAGE_KEY, JSON.stringify(normalized));
          }
        }catch(e){}
        try{
          if (typeof sessionStorage !== "undefined"){
            sessionStorage.setItem(LEGACY_RULE_UI_STORAGE_KEY, JSON.stringify(normalized));
          }
        }catch(e){}
        return normalized;
      }

      const api = {
        storageKey: RULE_STORAGE_KEY,
        activeStorageKey: ACTIVE_RULE_SET_STORAGE_KEY,
        defaults: { ...DEFAULTS },
        read(){
          return normalizeRuleState(readRawRuleState());
        },
        getRuleSetMeta(){
          return readActiveRuleSetMeta();
        },
        write(nextState){
          return persistRuleState(nextState);
        },
        getValue(key, fallback){
          const state = this.read();
          if (Object.prototype.hasOwnProperty.call(state, key)){
            if (key === "tiles-tile-composition") return cloneTileCompositionValue(state[key]);
            if (key === "tiles-chip-target-settings") return cloneChipTargetSettingsValue(state[key]);
            return state[key];
          }
          if (Object.prototype.hasOwnProperty.call(DEFAULTS, key)){
            if (key === "tiles-tile-composition") return cloneTileCompositionValue(DEFAULTS[key]);
            if (key === "tiles-chip-target-settings") return cloneChipTargetSettingsValue(DEFAULTS[key]);
            return DEFAULTS[key];
          }
          return fallback;
        },
        getNumber(key, fallback){
          const raw = this.getValue(key, fallback);
          const n = Number(raw);
          return Number.isFinite(n) ? n : fallback;
        },
        getTileComposition(){
          return cloneTileCompositionValue(this.getValue("tiles-tile-composition", DEFAULTS["tiles-tile-composition"]));
        },
        getChipTargetSettings(){
          return cloneChipTargetSettingsValue(this.getValue("tiles-chip-target-settings", DEFAULTS["tiles-chip-target-settings"]));
        },
        getChipTargetSetting(tileCode){
          const all = this.getChipTargetSettings();
          const key = String(tileCode || "");
          if (key && Object.prototype.hasOwnProperty.call(all, key)) {
            return normalizeChipTargetTileSettingValue(all[key]);
          }
          const normalizedKey = getChipTargetSettingStorageKey(tileCode);
          if (normalizedKey && Object.prototype.hasOwnProperty.call(all, normalizedKey)) {
            return normalizeChipTargetTileSettingValue(all[normalizedKey]);
          }
          return buildChipTargetOverviewBaseSetting(this.getValue("overview-chip-target-colored", DEFAULTS["overview-chip-target-colored"]));
        },
        getEffectiveChipTargetSetting(tileCode){
          const setting = this.getChipTargetSetting(tileCode);
          const targetMode = setting.targetMode === "naki" ? "naki" : "menzen";
          const doraCount = setting.useDetailedDora
            ? {
                menzen: String(setting.doraMenzenCount != null ? setting.doraMenzenCount : setting.doraCount),
                furo: String(setting.doraFuroCount != null ? setting.doraFuroCount : setting.doraCount)
              }
            : {
                menzen: String(setting.doraCount),
                furo: String(setting.doraCount)
              };
          const chipCount = setting.useDetailedChip
            ? {
                menzen: String(setting.chipMenzenCount != null ? setting.chipMenzenCount : setting.chipValue),
                furo: String(setting.chipFuroCount != null ? setting.chipFuroCount : setting.chipValue)
              }
            : {
                menzen: String(setting.chipValue),
                furo: targetMode === "naki" ? String(setting.chipValue) : "0"
              };

          return {
            ...setting,
            targetMode,
            doraCount,
            chipCount
          };
        }
      };

      Object.defineProperty(api, "ruleSetId", {
        get(){
          return readActiveRuleSetMeta().ruleSetId;
        }
      });

      Object.defineProperty(api, "ruleSetName", {
        get(){
          return readActiveRuleSetMeta().ruleSetName;

      });

      window.MBSanmaRulesConfig = api;
      renderAppliedRuleSetBadge();
